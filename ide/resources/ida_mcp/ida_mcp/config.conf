# IDA-MCP 配置文件
# ==================
# 支持 stdio 和 HTTP 两种连接方式

# ==================
# 传输方式开关
# ==================
enable_stdio = false # 是否启用 stdio 模式（gateway proxy 子进程，供 MCP 客户端通过子进程连接）
enable_http = true # 是否启用 HTTP 代理模式（供 MCP 客户端通过 URL 连接）
enable_unsafe = true # 是否启用 unsafe 工具（py_eval、调试器相关工具）
wsl_path_bridge = false # 仅在“LLM/客户端工作在 WSL，但 IDA/Python 在 Windows 宿主机”时开启；
						# 开启后 open_in_ida 会桥接 Windows/WSL 路径

# ==================
# HTTP 代理配置 (自动启动，客户端只需填写 URL)
# ==================
http_host = "0.0.0.0" # HTTP 网关监听地址；客户端会自动改用 127.0.0.1 访问
http_port = 11338 # HTTP 代理端口
http_path = "/mcp" # MCP 端点路径

# ==================
# IDA 实例配置
# ==================
ida_default_port = 10000 # IDA 实例 MCP 端口起始值
ida_host = "127.0.0.1" # IDA 实例 MCP 监听地址；默认仅监听本机
ida_path = "D:\\safetools\\IDAPro-9.3\\ida.exe" # IDA 可执行文件路径
ida_python = "D:\\safetools\\IDAPro-9.3\\ida-python\\python.exe" # IDA Python 可执行文件路径
open_in_ida_bundle_dir = "" # 可选。配置后 open_in_ida 会把目标文件复制到该目录下的时间戳目录；
							# 若存在匹配的 .i64/.idb 也会一起复制并优先打开数据库。未配置时直接打开原始路径
open_in_ida_autonomous = true # 是否默认让 open_in_ida 追加 -A
auto_start = false # 插件加载后是否默认自动启动实例服务
server_name = "IDA-MCP" # MCP 服务名


# ==================
# 通用配置
# ==================
request_timeout = 30 # 请求超时时间（秒）
debug = false # 是否启用调试日志
